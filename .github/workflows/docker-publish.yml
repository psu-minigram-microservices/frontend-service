name: Build & Push Docker Image

on:
  push:
    tags: ['v*']

  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        default: 'dev'
        required: true

jobs:
  build:
    name: Build & Push
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Buildx
        uses: useblacksmith/setup-buildx-action@v1

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          push: true
          tags: |
            ghcr.io/psu-minigram-microservices/frontend-service:${{ steps.tag.outputs.value }}
            ghcr.io/psu-minigram-microservices/frontend-service:latest
